services:
  - type: web
    name: scm-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: "1521"
      - key: DB_SERVICE
        value: FREEPDB1
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
